quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# Matcher service URL
matcher.api.url=http://localhost:8081
quarkus.rest-client."com.zenline.client.MatcherClient".url=${matcher.api.url}

# PostgreSQL datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=zenline
quarkus.datasource.password=zenline
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/zenline

# Hibernate ORM
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
